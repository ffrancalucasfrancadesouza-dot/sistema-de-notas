<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <img src="assets/logo neguin/WhatsApp Image 2026-07-15 at 23.27.33.jpeg" class="logo">

    <title>Neguinho Mecânica</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <h1>🚗 Neguinho Mecânica</h1>

        <form action="orcamento.php" method="POST">

            <label>Cliente</label>

            <input type="text" name="cliente" required>

            <label>Telefone</label>

            <input type="text" name="telefone">

            <label>Veículo</label>

            <input type="text" name="veiculo" required>

            <label>Placa</label>

            <input type="text" name="placa">

            <hr>

            <h2>Peças</h2>

            <div class="pecas">

                <input type="text" id="nomePeca" placeholder="Nome da peça">

                <input type="number" id="valorPeca" placeholder="Valor">

                <button type="button" onclick="adicionarPeca()">

                    ➕

                </button>

            </div>

            <div id="listaPecas"></div>

            <input type="hidden" name="pecas" id="pecas">

            <hr>

            <label>Mão de obra</label>

            <input type="number" id="maoObra" name="maoObra" onkeyup="calcularTotal()">
            <h3>

                Total das peças:
                R$ <span id="totalPecas">0,00</span>

            </h3>

            <h2>

                Total

                R$

                <span id="total">

                    0,00

                </span>

            </h2>

            <input type="hidden" name="total" id="totalHidden">

            <button class="gerar">

                🖨 GERAR PDF

            </button>

        </form>

    </div>

    <script src="script.js"></script>

</body>

</html>
